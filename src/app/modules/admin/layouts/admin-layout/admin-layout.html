<div
  class="bg-slate-800 overflow-y-scroll w-screen h-screen antialiased text-slate-300 selection:bg-blue-600 selection:text-white">
  <div class="flex flex-col relative w-screen">
    <div id="menu" class="bg-gray-900 min-h-screen z-10 text-slate-300 w-64 fixed left-0 h-screen overflow-y-scroll">
      <div id="logo" class="my-4 px-6">
        <h1 class="text-lg md:text-2xl font-bold text-white">Testlo<span class="text-blue-500">| Shop</span>
        </h1>
        <p class="text-slate-500 text-sm">Manage your actions and activities</p>
      </div>
      <div id="profile" class="px-6 py-10">
        <p class="text-slate-500">Bienvenido,</p>
        <a routerLink="/" class="inline-flex space-x-2 items-center">
          <span>
            <!-- <img class="rounded-full w-8 h-8"
              src="https://images.unsplash.com/photo-1542909168-82c3e7fdca5c?ixlib=rb-4.0.3&ixid=MnwxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8&auto=format&fit=crop&w=128&q=80"
              alt=""> -->
            <ng-icon name="heroUser" size="16px" />
          </span>
          <span class="text-sm md:text-base font-bold">
            {{user()?.fullName}}
          </span>
        </a>
      </div>
      <div id="nav" class="w-full px-6">
        <a routerLink="/admin" routerLinkActive='bg-blue-800' [routerLinkActiveOptions]="{exact:true}"
          class="w-full px-2 inline-flex space-x-2 items-center border-b border-slate-700 py-3 hover:bg-white/5 transition ease-linear duration-150">
          <div>
            <ng-icon name="heroChartPie" size="16px" />
          </div>
          <div class="flex flex-col">
            <span class="text-lg font-bold leading-5 text-white">Dashboard</span>
            <span class="text-sm text-white/50 hidden md:block">Data Overview</span>
          </div>
        </a>
        <a routerLink="/admin/products" routerLinkActive='bg-blue-800' class=" w-full px-2 inline-flex space-x-2 items-center py-3 hover:bg-white/5 transition ease-linear
          duration-150">
          <div>
            <ng-icon name="heroInboxSolid" size="16px" />
          </div>
          <div class="flex flex-col">
            <span class="text-lg text-slate-300 font-bold leading-5">Productos</span>
            <span class="text-sm text-slate-500 hidden md:block">Listado de productos</span>
          </div>
        </a>

        <a routerLink="/admin/category" routerLinkActive='bg-blue-800'
          class="w-full px-2 inline-flex space-x-2 items-center  py-3 hover:bg-white/5 transition ease-linear duration-150">
          <div>
            <ng-icon name="heroRectangleStack" size="16px" />
          </div>
          <div class="flex flex-col">
            <span class="text-lg text-slate-300 font-bold leading-5">Categorias</span>
            <span class="text-sm text-slate-500 hidden md:block">Listado de categorias</span>
          </div>
        </a>


        <div class="divider my-2"></div>

        <button class="btn btn-soft btn-error w-full" (click)="onLogout()">
          <ng-icon name="heroArrowRightOnRectangle" size="16px" />
          Cerrar sesion
        </button>


      </div>
    </div>


  </div>
  <div class="flex-1 ml-64 pt-5 px-5">
    <router-outlet />
  </div>
</div>
