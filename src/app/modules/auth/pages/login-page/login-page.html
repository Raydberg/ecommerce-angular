<form class="flex flex-col gap-2" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

  <label class="input input-bordered flex items-center gap-2">

    <input formControlName="email" type="text" autocomplete="off" placeholder="email">
  </label>

  <label class="input input-bordered flex items-center gap-2">
    <input formControlName="password" autocomplete="off" type="password" class="grow" placeholder="Password" />
  </label>

  <button type="submit" class="btn btn-secondary">
    Ingresar
  </button>


  <p class="text-slate-700 text-xs">No tienes cuenta ?
    <a routerLink="/auth/register" class="text-secondary">Crea una aqui</a>

  </p>
</form>




@if (hasError()) {
<div role="alert" class="alert alert-error animate-fadeIn fixed bottom-5 right-5 w-52">
  <ng-icon name="heroExclamationTriangle" size="16px" />
  <span>Verifique la informacion ingresada</span>
</div>
}
